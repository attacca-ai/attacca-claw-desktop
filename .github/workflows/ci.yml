name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  build-mac:
    runs-on: macos-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npx electron-vite build && npx electron-builder --mac --arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Validate DMG exists
        run: ls -la dist/*.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg
          retention-days: 7

  smoke-mac:
    runs-on: macos-latest
    needs: build-mac
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist/

      - name: Extract app from DMG
        run: |
          DMG_FILE=$(ls dist/*.dmg | head -1)
          hdiutil attach "$DMG_FILE" -mountpoint /Volumes/AttaccaClaw -nobrowse
          cp -R "/Volumes/AttaccaClaw/AttaccaClaw.app" ./AttaccaClaw.app
          hdiutil detach /Volumes/AttaccaClaw

      - name: Run smoke tests
        run: npx playwright test e2e/
        env:
          ELECTRON_APP_PATH: ./AttaccaClaw.app/Contents/MacOS/AttaccaClaw
